<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de citas</title>
  <link rel="stylesheet" href="estilos.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css">
</head>

<body>

<header class="header">
  <div class="logo-titulo">
    <i class="fi fi-brands-yelp"></i>
    <h1 class="title">Sistema de citas</h1>
  </div>

  <nav>
    <ul class="nav-list">
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Localidades</a></li>
      <li><a href="#">Contacto</a></li>
      <li><a href="#">Nosotros</a></li>
    </ul>
  </nav>
</header>

<section class="registro">
  <h2 id="tituloForm">Registro de cita</h2>

  <form id="formCita">
    <fieldset>

      <input type="hidden" id="txtId" />

      <div class="campo">
        <label>Nombre</label>
        <input type="text" id="txtNombre" required>
      </div>

      <div class="campo">
        <label>Apellido</label>
        <input type="text" id="txtApellido" required>
      </div>

      <div class="campo">
        <label>Cédula</label>
        <input type="text" id="txtCedula" required>
      </div>

      <div class="campo">
        <label>Teléfono</label>
        <input type="tel" id="txtTelefono" required>
      </div>

      <div class="campo">
        <label>Fecha</label>
        <input type="date" id="txtFecha" required>
      </div>

      <div class="campo">
        <label>Hora</label>
        <select id="txtHora" required>
          <option value="" disabled selected>Seleccione una hora</option>
        </select>
      </div>

      <button id="btnAdd" type="submit">Guardar</button>
      <button id="btnCancel" type="button">Cancelar</button>

    </fieldset>
  </form>
</section>

<section class="tabla">
  <h2>Citas registradas</h2>

  <table class="tabla-citas">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Cédula</th>
        <th>Teléfono</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbodyClientes"></tbody>
  </table>
</section>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="./app.js"></script>

</body>
</html>
