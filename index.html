<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de citas</title>
    <link rel="stylesheet" href="estilos.css" />
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css">
</head>

<body>

<header class="header">

  <div class="logo-titulo">
    <i class="fi fi-brands-yelp"></i>
    <h1 class="title">Sistema de citas</h1>
  </div>


  <nav class="nav-menu">
    <ul class="nav-list">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="localidades.html">Localidades</a></li>
      <li><a href="contacto.html">Contacto</a></li>
      <li><a href="nosotros.html">Nosotros</a></li>
    </ul>
  </nav>

</header>

<section class="registro">

  <h2 id="tituloForm">Registro de cita</h2>

  <form id="formCita">
    <fieldset>

      <input type="hidden" id="txtId" />

      <label for="txtNombre">Nombre</label>
      <input type="text" id="txtNombre" placeholder="Ingrese el nombre del cliente." required>

      <label for="txtApellido">Apellido:</label>
      <input type="text" id="txtApellido" placeholder="Ingrese el apellido del cleinte." required />

      <label for="txtCedula">Número de cédula</label>
      <input type="text" id="txtCedula" required pattern="[0-9]{9}" placeholder="Ej: 123456789">

      <label for="txtTelefono">Teléfono</label>
      <input type="tel" id="txtTelefono" placeholder="Ingrese el numero de contacto." required>

      <label for="txtFecha">Fecha de la cita</label>
      <input type="date" id="txtFecha" required>

      <label for="txtHora">Hora</label>
      <input type="time" id="txtHora" required>

      <button id="btnAdd" class="btn btn-success" type="submit">Agregar</button>
      <button id="btnCancel" class="btn btn-success" type="button">Cancelar</button>

    </fieldset>

  </form>
</section>

<section class="tabla">

  <h2 >Citas registradas</h2>

  <table class="tabla-citas">

    <thead>
      <tr>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Cedula</th>
        <th>Teléfono</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbodyClientes"></tbody>
  </table>
</section>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="./app.js"></script>

</body>


</html>
